

<!DOCTYPE html>
<html>
<head>
    <title>FloatChat with Visualization</title>

    <!-- Bootstrap & FontAwesome -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    
    <!-- Chart.js for scatter plot -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Leaflet.js for map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- Leaflet Heatmap plugin -->
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
</head>

<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">        
            <div class="col-md-8 col-xl-6 chat">
                <div class="card">
                    <!-- Chat header -->
                    <div class="card-header msg_head">
                        <div class="d-flex bd-highlight">
                            <div class="img_cont">
                                <img src="https://cdn-icons-png.flaticon.com/512/427/427735.png" class="rounded-circle user_img">
                                <span class="online_icon"></span>
                            </div>
                            <div class="user_info">
                                <span>FloatChat</span>
                                <p>Ask me anything about ARGO data!</p>
                            </div>
                        </div>
                    </div>

                    <!-- Chat messages -->
                    <div id="messageFormeight" class="card-body msg_card_body"></div>

                    <!-- Chat input & visualization buttons -->
                    <div class="card-footer">
                        <form id="messageArea" class="input-group">
                            <input type="text" id="text" name="msg" placeholder="Type your message..." autocomplete="off" class="form-control type_msg" required/>
                            <div class="input-group-append">
                                <button type="submit" id="send" class="input-group-text send_btn">
                                    <i class="fas fa-location-arrow"></i>
                                </button>
                                <button type="button" id="plot-temp-salinity" class="input-group-text send_btn" title="Temperature vs Salinity">
                                    <i class="fas fa-chart-scatter"></i>
                                </button>
                                <button type="button" id="plot-float-map" class="input-group-text send_btn" title="Float Location Map">
                                    <i class="fas fa-map-marker-alt"></i>
                                </button>
                                <button type="button" id="plot-heat-map" class="input-group-text send_btn" title="Heatmap of float density">
                                    <i class="fas fa-fire"></i>
                                </button>
                                <button type="button" id="plot-coral-alert" class="input-group-text send_btn" title="Coral Reef Health Status">
                                    <i class="fas fa-heart"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Visualization container OUTSIDE the chat card -->
                <div id="visualization" style="margin-top:15px; display:none;">
                    <canvas id="scatterPlot" style="width:100%; height:300px;"></canvas>
                    <div id="mapContainer" style="width:100%; height:300px; display:none;"></div>
                </div>

                <!-- Coral Alert Container -->
                <div id="coralAlertContainer" style="margin-top:15px; display:none; max-height: 600px; overflow-y: auto;">
                    <div class="card">
                        <div class="card-header coral-header">
                            <h5 style="margin: 0;">🪸 Coral Reef Health Monitor</h5>
                        </div>
                        <div class="card-body">
                            <div id="coralHealthStatus" style="text-align: center; font-size: 1.2em; margin-bottom: 15px;"></div>
                            <div id="coralCharts" style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%;">
                                <div style="width: 320px; height: 320px;">
                                    <canvas id="coralPieChart" style="width: 100%; height: 100%;"></canvas>
                                </div>
                                <div style="width: 420px; height: 320px;">
                                    <canvas id="coralBarChart" style="width: 100%; height: 100%;"></canvas>
                                </div>
                            </div>
                            <div id="coralStats" style="margin-top: 15px; padding: 10px; background-color: #f8f9fa; border-radius: 5px; font-size: 0.95em;"></div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            let map;
            let mapInitialized = false;
            let markerGroup = null;
            let heatLayer = null;

            // Chat message submission
            $("#messageArea").on("submit", function(event) {
                event.preventDefault();
                
                const date = new Date();
                const str_time = date.getHours() + ":" + (date.getMinutes()<10?"0":"") + date.getMinutes();
                var rawText = $("#text").val();
                
                if (!rawText.trim()) {
                    console.log("Empty message, skipping");
                    return;
                }

                console.log("Sending message:", rawText);

                // User message bubble
                var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + rawText + '<span class="msg_time_send">'+ str_time +'</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';
                $("#text").val("");
                $("#messageFormeight").append(userHtml);
                $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

                // Send to Flask backend
                $.ajax({
                    data: JSON.stringify({ msg: rawText }),
                    type: "POST",
                    url: "/get",
                    contentType: "application/json",
                    dataType: "json"
                }).done(function(response) {
                    console.log("Response from server:", response);
                    
                    // Parse response
                    var data = response;
                    var answerText = data.answer || "No response";
                    var isMapRelated = data.is_map_related || data.show_map_button || false;
                    var oceanData = data.ocean_data || null;
                    var detectedOcean = data.detected_ocean || null;

                    console.log("Answer:", answerText);
                    console.log("Is Map Related:", isMapRelated);
                    console.log("Ocean Data:", oceanData);
                    console.log("Detected Ocean:", detectedOcean);

                    // Build bot response HTML
                    var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/427/427735.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + answerText;
                    
                    // Add map button if response is map-related or ocean is detected
                    if (isMapRelated || oceanData) {
                        var mapBtnText = oceanData ? ('View ' + oceanData.name) : 'View on Map';
                        botHtml += '<div class="mt-2"><button class="btn btn-sm btn-primary view-map-btn" style="margin-top: 8px;"><i class="fas fa-map"></i> ' + mapBtnText + '</button></div>';
                    }
                    
                    botHtml += '<span class="msg_time">'+ str_time +'</span></div></div>';
                    $("#messageFormeight").append($.parseHTML(botHtml));
                    
                    // Store ocean data for map button handler
                    $(".view-map-btn").last().data('oceanData', oceanData).data('detectedOcean', detectedOcean);
                    
                    // Attach click handler to dynamically created map button
                    $(".view-map-btn").last().click(function() {
                        const oceanData = $(this).data('oceanData');
                        const detectedOcean = $(this).data('detectedOcean');
                        openFloatMap(oceanData, detectedOcean);
                    });

                    // Auto-open map if ocean is detected
                    if (oceanData) {
                        openFloatMap(oceanData, detectedOcean);
                    }

                    // Logging for debugging
                    console.log('visualization_data', data.visualization_data);
                    console.log('csv_viz', data.csv_viz);

                    // Query-driven scatter or heatmap; if found, use it and skip CSV fallback
                    if (data.visualization_data) {
                        if (data.visualization_data.plot_type === 'scatter') {
                            renderScatterPlot(data.visualization_data);
                        } else if (data.visualization_data.visualization_type === 'salinity_heatmap') {
                            openHeatMap(null, null, data.visualization_data.points);
                        }

                        $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
                        return;
                    }

                    // Render CSV-based visualization if no higher-priority visualization exists
                    if (data.csv_viz) {
                        renderCSVVisualization(data.csv_viz);
                    }

                    $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
                }).fail(function(jqXHR, textStatus, errorThrown) {
                    console.error("AJAX Error:", textStatus, errorThrown);
                    console.error("Response Text:", jqXHR.responseText);
                    
                    var errorHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/427/427735.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">Sorry, something went wrong. Error: ' + textStatus + '<span class="msg_time">'+ str_time +'</span></div></div>';
                    $("#messageFormeight").append($.parseHTML(errorHtml));
                    $("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
                });
            });

            // function to initialize the base map and click-to-fact behavior
            function initMap(oceanData) {
                if (!mapInitialized) {
                    var centerLat = 20.5937;
                    var centerLon = 78.9629;
                    var zoomLevel = 3;

                    if (oceanData && oceanData.center) {
                        centerLat = oceanData.center.lat;
                        centerLon = oceanData.center.lon;
                        zoomLevel = oceanData.zoom || 3;
                    }

                    map = L.map('mapContainer').setView([centerLat, centerLon], zoomLevel);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors',
                        maxZoom: 19
                    }).addTo(map);

                    markerGroup = L.layerGroup().addTo(map);
                    heatLayer = null;

                    map.on('click', function(e) {
                        const clickedOcean = getOceanByLatLon(e.latlng.lat, e.latlng.lng);
                        if (clickedOcean) {
                            const oceanFact = getOceanFact(clickedOcean);
                            map.openPopup(L.popup({closeButton: true})
                                .setLatLng(e.latlng)
                                .setContent('<b>' + capitalize(clickedOcean) + ' Ocean</b><br>' + oceanFact));
                            appendChatFact('You clicked in the ' + capitalize(clickedOcean) + ' Ocean. Fact: ' + oceanFact);
                        } else {
                            map.openPopup(L.popup({closeButton: true})
                                .setLatLng(e.latlng)
                                .setContent('Location is not in the defined major oceans.'));
                        }
                    });

                    mapInitialized = true;
                } else {
                    if (oceanData && oceanData.center) {
                        map.setView([oceanData.center.lat, oceanData.center.lon], oceanData.zoom || 3);
                    }
                    map.invalidateSize();
                }
            }

            function loadFloatMarkers(floats) {
                if (!markerGroup) markerGroup = L.layerGroup().addTo(map);
                markerGroup.clearLayers();
                floats.forEach(f => {
                    if (f.lat && f.lon) {
                        L.marker([f.lat, f.lon])
                            .bindPopup('<strong>' + f.name + '</strong><br>Lat: ' + f.lat + '<br>Lon: ' + f.lon)
                            .addTo(markerGroup);
                    }
                });
            }

            function openFloatMap(oceanData, detectedOcean) {
                $('#visualization').show();
                $('#scatterPlot').hide();
                $('#mapContainer').show();

                initMap(oceanData);

                var floatUrl = '/get-floats';
                if (detectedOcean) floatUrl += '?ocean=' + encodeURIComponent(detectedOcean);

                $.ajax({
                    url: floatUrl,
                    type: 'GET',
                    dataType: 'json',
                    success: function(floats) {
                        console.log('Floats loaded for map:', floats);
                        loadFloatMarkers(floats);
                        map.invalidateSize();
                    },
                    error: function(jqXHR, textStatus, errorThrown) {
                        console.error('Failed to load float data:', textStatus, errorThrown);
                        alert('Failed to load float data from server.');
                    }
                });
            }

            function openHeatMap(oceanData, detectedOcean, dataPoints) {
                console.log('openHeatMap called', oceanData, detectedOcean, dataPoints);
                if (typeof L === 'undefined') {
                    alert('Leaflet L not loaded');
                    return;
                }
                if (typeof L.heatLayer === 'undefined') {
                    alert('L.heatLayer not loaded');
                    return;
                }
                initMap(oceanData);
                // For heatmap, ensure global view to show all points
                if (!oceanData) {
                    map.setView([0, 0], 2);
                }

                var drawHeat = function(points) {
                    if (heatLayer) {
                        map.removeLayer(heatLayer);
                    }
                    heatLayer = L.heatLayer(points, {radius: 25, blur: 18, maxZoom: 17}).addTo(map);
                };

                if (dataPoints && Array.isArray(dataPoints) && dataPoints.length > 0) {
                    drawHeat(dataPoints);
                    map.invalidateSize();
                    return;
                }

                var floatUrl = '/get-floats';
                if (detectedOcean) floatUrl += '?ocean=' + encodeURIComponent(detectedOcean);

                $.ajax({
                    url: floatUrl,
                    type: 'GET',
                    dataType: 'json',
                    success: function(floats) {
                        map.invalidateSize();
                        if (floats && floats.length > 0) {
                            var heatPoints = floats
                                .filter(f => f.lat && f.lon)
                                .map(f => [f.lat, f.lon, 0.7]);
                            drawHeat(heatPoints);
                        }
                        loadFloatMarkers(floats);
                    },
                    error: function(jqXHR, textStatus, errorThrown) {
                        console.error('Failed to load float data for heatmap:', textStatus, errorThrown);
                        alert('Failed to load float data for heatmap.');
                    }
                });
            }

            function getOceanByLatLon(lat, lon) {
                // Normalize lon to [-180, 180]
                var normalizedLon = ((lon + 180) % 360 + 360) % 360 - 180;

                // Pacific Ocean approx boundaries (broad, includes North and South Pacific)
                if ((normalizedLon >= 120 && normalizedLon <= 180) || (normalizedLon >= -180 && normalizedLon <= -70)) {
                    if (lat >= -70 && lat <= 70) {
                        return 'pacific';
                    }
                }

                // Atlantic Ocean approximate
                if (normalizedLon > -70 && normalizedLon < 20 && lat >= -70 && lat <= 70) {
                    return 'atlantic';
                }

                // Indian Ocean approximate
                if (normalizedLon >= 20 && normalizedLon <= 120 && lat >= -60 && lat <= 30) {
                    return 'indian';
                }

                // Arctic/Southern fallback
                if (lat > 70) return 'arctic';
                if (lat < -60) return 'southern';

                return null;
            }

            function getOceanFact(oceanKey) {
                var facts = {
                    pacific: 'The Pacific Ocean is the largest and deepest ocean, covering over 30% of the Earth’s surface.',
                    atlantic: 'The Atlantic Ocean is the second-largest ocean, known for the Gulf Stream that warms Europe.',
                    indian: 'The Indian Ocean is the warmest ocean and is bounded by Africa, Asia, Australia, and the Southern Ocean.',
                    arctic: 'The Arctic Ocean is the smallest and shallowest ocean, with sea ice covering much of its surface.',
                    southern: 'The Southern Ocean encircles Antarctica and plays a key role in global ocean circulation.'
                };
                return facts[oceanKey] || 'No specific fact available for this region yet.';
            }

            function capitalize(str) {
                return str ? str.charAt(0).toUpperCase() + str.slice(1) : str;
            }

            function appendChatFact(text) {
                var date = new Date();
                var str_time = date.getHours() + ':' + (date.getMinutes() < 10 ? '0' : '') + date.getMinutes();
                var factHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/427/427735.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + text + '<span class="msg_time">' + str_time + '</span></div></div>';
                $('#messageFormeight').append(factHtml);
                $('#messageFormeight').scrollTop($('#messageFormeight')[0].scrollHeight);
            }

            function renderScatterPlot(viz) {
                console.log('renderScatterPlot called', viz);
                if (!viz || !viz.points) return;

                $('#visualization').show();
                $('#scatterPlot').show();
                $('#mapContainer').hide();

                var scatterData = {
                    datasets: [{
                        label: viz.title || 'Scatter Plot',
                        data: viz.points,
                        backgroundColor: 'rgba(255, 99, 132, 0.7)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        pointRadius: 6
                    }]
                };

                var scatterOptions = {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: viz.x_label || 'X' }, beginAtZero: true },
                        y: { title: { display: true, text: viz.y_label || 'Y' }, beginAtZero: true }
                    }
                };

                if (scatterChart) scatterChart.destroy();
                scatterChart = new Chart(document.getElementById('scatterPlot'), {
                    type: 'scatter',
                    data: scatterData,
                    options: scatterOptions
                });
            }

            function renderCSVVisualization(csvViz) {
                if (!csvViz || !csvViz.labels || !csvViz.values) return;

                $('#visualization').show();
                $('#scatterPlot').show();
                $('#mapContainer').hide();

                // Convert histogram to bar for Chart.js compatibility
                var chartType = csvViz.plot_type;
                if (chartType === 'histogram') chartType = 'bar';

                const data = {
                    labels: csvViz.labels,
                    datasets: [{
                        label: csvViz.title || 'CSV Data',
                        data: csvViz.values,
                        backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1,
                        fill: false
                    }]
                };

                const options = {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { title: { display: true, text: csvViz.x_label || 'Category' } },
                        y: { title: { display: true, text: csvViz.y_label || 'Value' }, beginAtZero: true }
                    }
                };

                if (scatterChart) scatterChart.destroy();
                scatterChart = new Chart(document.getElementById('scatterPlot'), {
                    type: chartType,
                    data: data,
                    options: options
                });
            }

            let scatterChart;
            $('#plot-temp-salinity').click(function() {
                $('#visualization').show();
                $('#scatterPlot').show();
                $('#mapContainer').hide();

                const data = {
                    datasets: [{
                        label: 'Temperature vs Salinity',
                        data: [
                            { x: 30, y: 35 },
                            { x: 32, y: 36 },
                            { x: 28, y: 34 },
                            { x: 33, y: 37 }
                        ],
                        backgroundColor: 'rgba(82, 172, 255, 0.7)',
                    }]
                };

                const config = {
                    type: 'scatter',
                    data: data,
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: { 
                                title: { display: true, text: 'Temperature (°C)' },
                                beginAtZero: true 
                            },
                            y: { 
                                title: { display: true, text: 'Salinity (PSU)' },
                                beginAtZero: true 
                            }
                        }
                    }
                };

                if (scatterChart) scatterChart.destroy();
                scatterChart = new Chart(document.getElementById('scatterPlot'), config);
            });

            $('#plot-float-map').click(function() {
                openFloatMap();
            });

            $('#plot-heat-map').click(function() {
                openHeatMap();
            });

            let coralPieChart;
            let coralBarChart;

            $('#plot-coral-alert').click(function() {
                openCoralAlert();
            });

            function openCoralAlert() {
                $('#visualization').hide();
                $('#coralAlertContainer').show();

                $.ajax({
                    url: '/get-coral-health',
                    type: 'GET',
                    dataType: 'json',
                    success: function(healthData) {
                        console.log('Coral health data:', healthData);
                        
                        // Display health status
                        let statusColor = '#4cd137'; // green
                        if (healthData.health_level === 'warning') {
                            statusColor = '#ffa502'; // orange
                        } else if (healthData.health_level === 'critical') {
                            statusColor = '#ff3838'; // red
                        }
                        
                        $('#coralHealthStatus').html(
                            '<div style="color: ' + statusColor + ';">' + healthData.status + '</div>' +
                            '<div style="font-size: 0.9em; color: #fff; margin-top: 8px;">Damage: ' + healthData.damage_percent.toFixed(2) + '%</div>'
                        );

                        // Load visualization data
                        $.ajax({
                            url: '/get-coral-visualization',
                            type: 'GET',
                            dataType: 'json',
                            success: function(vizData) {
                                console.log('Coral visualization data:', vizData);

                                // Small delay to ensure DOM is ready with new container
                                setTimeout(function() {
                                    // Render pie chart
                                    if (coralPieChart) coralPieChart.destroy();
                                    coralPieChart = new Chart(document.getElementById('coralPieChart'), {
                                        type: 'doughnut',
                                        data: {
                                            labels: vizData.pie_data.labels,
                                            datasets: [{
                                                data: vizData.pie_data.values,
                                                backgroundColor: ['#4cd137', '#ff3838'],
                                                borderColor: ['#fff', '#fff'],
                                                borderWidth: 2
                                            }]
                                        },
                                        options: {
                                            responsive: true,
                                            maintainAspectRatio: true,
                                            plugins: {
                                                legend: { position: 'bottom', labels: { color: '#fff' } },
                                                title: { display: true, text: 'Coral Health Distribution', color: '#fff' }
                                            }
                                        }
                                    });

                                    // Render bar chart
                                    const barLabels = vizData.bar_data.labels.slice(0, 8); // Limit to 8 for readability
                                    const barValues = vizData.bar_data.values.slice(0, 8);
                                    
                                    if (coralBarChart) coralBarChart.destroy();
                                    coralBarChart = new Chart(document.getElementById('coralBarChart'), {
                                        type: 'bar',
                                        data: {
                                            labels: barLabels,
                                            datasets: [{
                                                label: 'Count',
                                                data: barValues,
                                                backgroundColor: 'rgba(255, 107, 157, 0.7)',
                                                borderColor: 'rgba(255, 107, 157, 1)',
                                                borderWidth: 1
                                            }]
                                        },
                                        options: {
                                            responsive: true,
                                            maintainAspectRatio: true,
                                            indexAxis: 'y',
                                            plugins: {
                                                legend: { labels: { color: '#fff' } },
                                                title: { display: true, text: 'Label Distribution', color: '#fff' }
                                            },
                                            scales: {
                                                x: { ticks: { color: '#fff' }, title: { display: true, text: 'Count', color: '#fff' } },
                                                y: { ticks: { color: '#fff', font: { size: 10 } }, title: { display: true, text: 'Label', color: '#fff' } }
                                            }
                                        }
                                    });

                                    // Display statistics
                                    const totalAnnotations = healthData.total_samples;
                                    const damagedCount = healthData.damaged_samples;
                                    const healthyCount = totalAnnotations - damagedCount;

                                    $('#coralStats').html(
                                        '<strong>📊 Coral Annotation Statistics</strong><br><br>' +
                                        '<strong>Total Annotations:</strong> ' + totalAnnotations + '<br>' +
                                        '<strong>Damaged Coral:</strong> ' + damagedCount + ' (' + healthData.damage_percent.toFixed(2) + '%)<br>' +
                                        '<strong>Healthy Coral:</strong> ' + healthyCount + ' (' + (100 - healthData.damage_percent).toFixed(2) + '%)<br><br>' +
                                        '<em>Analysis based on: ' + Object.keys(vizData.label_distribution).length + ' different coral types detected</em>'
                                    );
                                }, 100);
                            },
                            error: function(jqXHR, textStatus, errorThrown) {
                                console.error('Failed to load coral visualization data:', textStatus, errorThrown);
                                $('#coralStats').html('<span style="color: #ff3838;">Error loading visualization data</span>');
                            }
                        });
                    },
                    error: function(jqXHR, textStatus, errorThrown) {
                        console.error('Failed to load coral health data:', textStatus, errorThrown);
                        $('#coralHealthStatus').html('<div style="color: #ff3838;">Error loading coral health data</div>');
                    }
                });
            }
            
            console.log("Chat interface loaded successfully");
        });
    </script>
</body>
</html>
